version: 2

updates:
  # Python backend dependencies
  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - python
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Node.js frontend dependencies
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Docker images
  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: monthly
    labels:
      - dependencies
      - docker

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - ci
    groups:
      actions:
        patterns:
          - "*"
