name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/api

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Ruff check
        run: |
          source .venv/bin/activate
          ruff check src/ tests/

      - name: Black check
        run: |
          source .venv/bin/activate
          black --check src/ tests/

      - name: MyPy
        run: |
          source .venv/bin/activate
          mypy src/ --config-file=pyproject.toml

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        working-directory: ./apps/web
        run: pnpm lint

      - name: TypeScript type-check
        working-directory: ./apps/web
        run: pnpm exec tsc --noEmit

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: lint-backend
    defaults:
      run:
        working-directory: ./apps/api

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379
      REDIS_PASSWORD: ""
      SECRET_KEY: test-secret-key-minimum-32-characters-long-for-testing
      FERNET_KEY: ${{ secrets.TEST_FERNET_KEY }}
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run fast unit tests with coverage
        run: |
          source .venv/bin/activate
          pytest tests/unit/ \
            -v \
            --tb=short \
            -m "not integration and not slow and not e2e and not benchmark and not multiprocess" \
            --ignore=tests/unit/test_base_repository.py \
            --ignore=tests/unit/test_auth_service_refactored.py \
            --ignore=tests/unit/test_conversation_repository.py \
            --ignore=tests/unit/test_pricing_service.py \
            --ignore=tests/unit/test_metrics_agents.py \
            --ignore=tests/unit/test_conversation_service_v2.py \
            --ignore=tests/unit/test_conversations_service.py \
            --ignore=tests/unit/test_connectors_service.py \
            --ignore=tests/unit/test_conversation_service.py \
            --ignore=tests/unit/domains/conversations/test_conversation_abandonment_metrics.py \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=43

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ./apps/api/coverage.xml
          flags: backend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest
        working-directory: ./apps/web
        run: pnpm test -- --coverage

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ./apps/web/coverage/coverage-final.json
          flags: frontend
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  code-hygiene:
    name: Code Hygiene
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Check for .bak files
        run: |
          BAK_FILES=$(find . -name "*.bak" -not -path "./.git/*" || true)
          if [ -n "$BAK_FILES" ]; then
            echo "::error::Backup files (.bak) found in repository:"
            echo "$BAK_FILES"
            exit 1
          fi

      - name: Check for synchronous Store calls in async context
        run: |
          SYNC_CALLS=$(grep -rn "runtime\.store\.put(\|runtime\.store\.get(\|runtime\.store\.delete(\|runtime\.store\.search(" apps/api/src/ | grep -v "await " || true)
          if [ -n "$SYNC_CALLS" ]; then
            echo "::error::Synchronous Store calls detected in async context (use aput/aget/adelete/asearch):"
            echo "$SYNC_CALLS"
            exit 1
          fi

      - name: Check for Redis setex without json.dumps
        run: |
          SETEX_LINES=$(grep -rn "\.setex(" apps/api/src/ || true)
          if [ -n "$SETEX_LINES" ]; then
            MISSING=$(echo "$SETEX_LINES" | grep -v "json\.dumps(" || true)
            if [ -n "$MISSING" ]; then
              echo "::warning::Redis setex() without json.dumps() detected — review these lines:"
              echo "$MISSING"
            fi
          fi

      - name: Check i18n keys sync
        run: |
          python -c "
          import json, sys, pathlib

          def get_keys(d, prefix=''):
              keys = set()
              for k, v in d.items():
                  full = f'{prefix}.{k}' if prefix else k
                  if isinstance(v, dict):
                      keys |= get_keys(v, full)
                  else:
                      keys.add(full)
              return keys

          locales = pathlib.Path('apps/web/locales')
          ref_lang = 'en'
          ref_keys = get_keys(json.loads((locales / ref_lang / 'translation.json').read_text(encoding='utf-8')))

          failed = False
          for lang_dir in sorted(locales.iterdir()):
              if not lang_dir.is_dir() or lang_dir.name == ref_lang:
                  continue
              target = lang_dir / 'translation.json'
              if not target.exists():
                  continue
              tgt_keys = get_keys(json.loads(target.read_text(encoding='utf-8')))
              missing = sorted(ref_keys - tgt_keys)
              extra = sorted(tgt_keys - ref_keys)
              if missing:
                  print(f'::error::MISSING in {lang_dir.name} ({len(missing)} keys): {missing[:5]}')
                  failed = True
              if extra:
                  print(f'::warning::EXTRA in {lang_dir.name} ({len(extra)} keys): {extra[:5]}')
          if failed:
              sys.exit(1)
          print('All i18n keys are in sync')
          "

      - name: Check Alembic migration conflicts
        run: |
          python -c "
          import re, pathlib, sys

          versions_dir = pathlib.Path('apps/api/alembic/versions')
          revisions = {}
          # Match both 'revision = \"val\"' and 'revision: str = \"val\"' formats
          rev_re = re.compile(r'^revision[^=]*=\s*[\"\\']([^\"\\' ]+)', re.MULTILINE)
          down_re = re.compile(r'^down_revision[^=]*=\s*[\"\\']([^\"\\' ]+)', re.MULTILINE)

          for f in sorted(versions_dir.glob('*.py')):
              content = f.read_text(encoding='utf-8')
              rev_match = rev_re.search(content)
              if rev_match:
                  revisions[rev_match.group(1)] = f.name

          # Heads = revisions not referenced as down_revision by any other migration
          referenced_as_parent = set()
          for f in sorted(versions_dir.glob('*.py')):
              content = f.read_text(encoding='utf-8')
              down_match = down_re.search(content)
              if down_match:
                  referenced_as_parent.add(down_match.group(1))

          heads = [r for r in revisions if r not in referenced_as_parent]

          if len(heads) > 1:
              print(f'::error::Multiple Alembic heads detected ({len(heads)}):')
              for h in heads:
                  print(f'  {h} ({revisions[h]})')
              sys.exit(1)
          elif len(heads) == 1:
              print(f'Single head: {heads[0]} ({revisions[heads[0]]})')
          else:
              print('No revisions found')
          "

      - name: Check .env.example completeness
        run: |
          python -c "
          import re, pathlib, sys

          env_example = pathlib.Path('.env.example').read_text(encoding='utf-8')
          env_keys = set(re.findall(r'^([A-Z][A-Z_0-9]+)=', env_example, re.MULTILINE))

          # Scan config files for env var references (Field default, env= parameter)
          config_dir = pathlib.Path('apps/api/src/core/config')
          env_refs = set()
          for f in config_dir.glob('*.py'):
              content = f.read_text(encoding='utf-8')
              # Match env='VAR_NAME' patterns in Pydantic settings
              env_refs |= set(re.findall(r'env=[\"\\']([A-Z][A-Z_0-9]+)[\"\\']', content))
              # Match Field(..., alias='VAR_NAME') or direct class var names that are UPPER_CASE
              for match in re.finditer(r'^    ([A-Z][A-Z_0-9]+):', content, re.MULTILINE):
                  env_refs.add(match.group(1))

          missing = sorted(env_refs - env_keys)
          # Filter out common false positives (internal Pydantic fields, etc.)
          missing = [v for v in missing if len(v) > 2 and not v.startswith('MODEL_')]

          if missing:
              print(f'::warning::Environment variables in config but missing from .env.example ({len(missing)}):')
              for v in missing:
                  print(f'  - {v}')
              # Warning only, not a hard failure
          else:
              print('.env.example is complete')
          "

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build API image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile.prod
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./apps/web/Dockerfile.prod
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
