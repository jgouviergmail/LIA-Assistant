# Configuration Tempo pour LIA
# Tempo est un système de tracing distribué backend pour OpenTelemetry

# Configuration du serveur
server:
  http_listen_port: 3200
  log_level: info

# Configuration du distributeur (réception des traces)
distributor:
  receivers:
    # Récepteur OTLP gRPC
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

    # Récepteur Jaeger (optionnel, pour compatibilité)
    jaeger:
      protocols:
        thrift_http:
          endpoint: 0.0.0.0:14268
        grpc:
          endpoint: 0.0.0.0:14250

    # Récepteur Zipkin (optionnel, pour compatibilité)
    zipkin:
      endpoint: 0.0.0.0:9411

# Configuration de l'ingestion
ingester:
  trace_idle_period: 10s
  max_block_bytes: 1_000_000
  max_block_duration: 5m
  complete_block_timeout: 15m

# Configuration du storage local
storage:
  trace:
    backend: local
    block:
      bloom_filter_false_positive: 0.05
      v2_index_downsample_bytes: 1000
      v2_encoding: zstd
    wal:
      path: /var/tempo/wal
      v2_encoding: snappy
    local:
      path: /var/tempo/blocks
    pool:
      max_workers: 100
      queue_depth: 10000

# Configuration de la rétention
compactor:
  compaction:
    block_retention: 168h  # 7 jours
    compacted_block_retention: 1h
    compaction_window: 1h
    max_compaction_objects: 1000000
    max_block_bytes: 100_000_000_000
    retention_concurrency: 10

# Configuration des métriques de span
metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: lia
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/tempo/generator/traces

# Configuration de la recherche de traces
query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09
  trace_by_id:
    duration_slo: 5s

# Configuration des limites par tenant
overrides:
  # Limites d'ingestion
  ingestion_rate_strategy: local
  ingestion_rate_limit_bytes: 15000000
  ingestion_burst_size_bytes: 20000000
  max_traces_per_user: 10000

  # Limites de recherche
  max_bytes_per_trace: 5000000
  max_search_duration: 168h
  max_bytes_per_tag_values_query: 5000000

  # Configuration du générateur de métriques
  metrics_generator_processors:
    - service-graphs
    - span-metrics

# Utilisation de la mémoire limitée
usage_report:
  reporting_enabled: false
