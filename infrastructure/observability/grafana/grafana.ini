# Configuration Grafana pour LIA
# Documentation: https://grafana.com/docs/grafana/latest/setup-grafana/configure-grafana/

[server]
# Serveur HTTP
http_port = 3000
domain = localhost
root_url = %(protocol)s://%(domain)s:%(http_port)s/

[paths]
# Chemins des données et logs
data = /var/lib/grafana
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning

[analytics]
# Désactiver la télémétrie Grafana
reporting_enabled = false
check_for_updates = true

[security]
# Sécurité (pour développement local)
admin_user = admin
admin_password = admin
# IMPORTANT: Changer ces valeurs en production !

[users]
# Permet aux utilisateurs de créer des organisations
allow_sign_up = false
allow_org_create = false
# Autoriser les mises à jour de profil
viewers_can_edit = false
editors_can_admin = false

[auth.anonymous]
# Activer l'accès anonyme en lecture seule (optionnel, pour démo)
enabled = false

[dashboards]
# Versions par défaut et paramètres
default_home_dashboard_path = /var/lib/grafana/dashboards/01-app-overview.json
# Configuration des dashboards
min_refresh_interval = 5s

[dataproxy]
# Timeout pour les requêtes aux datasources
timeout = 300
keep_alive_seconds = 300

[explore]
# Activer l'onglet Explore
enabled = true

[unified_alerting]
# Configuration des alertes (Grafana 11.3+)
enabled = true
execute_alerts = true

[log]
# Configuration des logs
mode = console
level = info

[log.console]
format = json

[metrics]
# Métriques internes Grafana (exposées sur /metrics)
enabled = true
basic_auth_username =
basic_auth_password =

[tracing.opentelemetry.otlp]
# IMPORTANT: Configuration OpenTelemetry pour corrélation traces ↔ métriques
# Grafana peut envoyer ses propres traces à Tempo
address = tempo:4317

[feature_toggles]
# Fonctionnalités expérimentales activées
enable = traceToMetrics,publicDashboards,tempoSearch,tempoServiceGraph,traceqlEditor
