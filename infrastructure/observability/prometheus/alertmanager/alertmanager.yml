# AlertManager Configuration - LIA
# Production-ready configuration with routing, inhibition, and multi-channel notifications
#
# NOTE: Alertmanager OSS does NOT support Go template env expansion ({{ env "..." }}).
# Use docker-compose environment variable substitution or envsubst for dynamic values.
# Currently configured with static receivers. To enable notifications:
#   1. Set receiver URLs directly in this file, or
#   2. Use a pre-processor (envsubst) in docker-compose entrypoint
#
# Docs: https://prometheus.io/docs/alerting/latest/configuration/

global:
  resolve_timeout: 5m

# Route configuration
route:
  receiver: 'default-log'
  group_by: ['alertname', 'component', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical alerts — faster grouping
    - match:
        severity: critical
      receiver: 'default-log'
      group_wait: 10s
      group_interval: 2m
      repeat_interval: 30m
      continue: false

    # Warning alerts
    - match:
        severity: warning
      receiver: 'default-log'
      group_wait: 1m
      group_interval: 10m
      repeat_interval: 2h
      continue: false

# Inhibition rules (prevent notification spam)
inhibit_rules:
  # If service is down, don't alert on high error rate or latency
  - source_match:
      alertname: 'ServiceDown'
    target_match:
      component: 'api'
    target_match_re:
      alertname: '(HighErrorRate|HighLatency.*|CriticalLatency.*)'
    equal: ['service']

  # If Redis is down, don't alert on connection issues
  - source_match:
      alertname: 'RedisDown'
    target_match:
      component: 'redis'
    target_match_re:
      alertname: '(RedisConnectionsHigh|RedisMemoryHigh)'

  # If PostgreSQL is down, don't alert on connection pool issues
  - source_match:
      alertname: 'PostgreSQLDown'
    target_match:
      component: 'postgresql'
    target_match_re:
      alertname: '(HighDatabaseConnections|CriticalDatabaseConnections|SlowQueries)'

  # If daily budget is exceeded, weekly/monthly alerts are redundant
  - source_match:
      alertname: 'LLMDailyBudgetExceeded'
    target_match_re:
      alertname: '(LLMWeeklyBudgetExceeded|LLMMonthlyBudgetExceeded)'
    equal: ['component']

  # Critical severity inhibits warnings for same alert
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'component']

# Receiver configurations
# Currently using webhook_configs with a null URL — alerts are logged by Alertmanager
# but not forwarded. Replace with real endpoints when notification channels are set up.
#
# To add Slack notifications:
#   - name: 'slack-critical'
#     slack_configs:
#       - api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
#         channel: '#alerts'
#
# To add email notifications:
#   - name: 'email-ops'
#     email_configs:
#       - to: 'ops@yourcompany.com'
#         from: 'alertmanager@lia.local'
#         smarthost: 'smtp.gmail.com:587'
#         auth_username: '...'
#         auth_password: '...'

receivers:
  - name: 'default-log'
    # No notification channel configured — alerts are visible in Alertmanager UI only.
    # Alertmanager logs fired alerts to stdout for Loki/Promtail ingestion.
