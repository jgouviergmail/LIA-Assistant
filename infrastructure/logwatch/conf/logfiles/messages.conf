# Override: read system messages from journald, filter Docker noise
LogFile = /dev/null
*JournalCtl = "--no-pager --facility=daemon --facility=user --facility=syslog --facility=local0 --facility=local1 --facility=local2 --facility=local3 --facility=local4 --facility=local5 --facility=local6 --facility=local7"
*ExpandRepeats
*ApplyStdDate
*Remove = "libcontainer container"
*Remove = "docker-[0-9a-f].*\.scope"
*Remove = "Container .* health"
*Remove = "run-docker-netns"
*Remove = "var-lib-docker"
