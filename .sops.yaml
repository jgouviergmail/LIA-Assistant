    key_groups:
      - age:
          - age13vwlxwmv9jvjq2mv6hnzk357uhn2pdgtw4stp4m8ydauvek90ypslkudx5
    encrypted_regex: "^(SECRET_KEY|FERNET_KEY|DATABASE_URL|REDIS_URL|OPENAI_API_KEY|DEEPSEEK_API_KEY|GOOGLE_GEMINI_API_KEY|GOOGLE_CLIENT_ID|GOOGLE_CLIENT_SECRET|GOOGLE_API_KEY|MICROSOFT_CLIENT_ID|MICROSOFT_CLIENT_SECRET|MICROSOFT_TENANT_ID|LANGFUSE_SECRET_KEY|LANGFUSE_PUBLIC_KEY|ALERTMANAGER_SMTP_AUTH_PASSWORD|ALERTMANAGER_SMTP_AUTH_USERNAME|ALERTMANAGER_SMTP_SMARTHOST|ALERTMANAGER_SMTP_FROM|ALERTMANAGER_BACKEND_TEAM_EMAIL|ALERTMANAGER_FINANCE_TEAM_EMAIL|ALERTMANAGER_SECURITY_TEAM_EMAIL|ALERTMANAGER_ML_TEAM_EMAIL|APPLICATION_SMTP_FROM|ANTHROPIC_API_KEY|POSTGRES_PASSWORD|POSTGRES_USER|REDIS_PASSWORD|PGADMIN_DEFAULT_PASSWORD|PGADMIN_DEFAULT_EMAIL|GRAFANA_ADMIN_PASSWORD|GRAFANA_ADMIN_USER|MINIO_ROOT_PASSWORD|MINIO_ROOT_USER|LANGFUSE_DB_PASSWORD|LANGFUSE_DB_USER|CLICKHOUSE_PASSWORD|CLICKHOUSE_USER|LANGFUSE_REDIS_PASSWORD|LANGFUSE_NEXTAUTH_SECRET|LANGFUSE_SALT|LANGFUSE_ENCRYPTION_KEY|NEXT_PUBLIC_FIREBASE_API_KEY|NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID|NEXT_PUBLIC_FIREBASE_APP_ID|NEXT_PUBLIC_FIREBASE_VAPID_KEY|NEXT_PUBLIC_GOOGLE_CLIENT_ID|TELEGRAM_BOT_TOKEN|TELEGRAM_WEBHOOK_SECRET|TELEGRAM_BOT_USERNAME)$"
